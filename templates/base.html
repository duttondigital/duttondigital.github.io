<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pathway+Extreme:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0b0b0b;
      --fg: #e8e8e8;
      --accent: #fff;
      --accent-dim: rgba(255, 255, 255, 0.06);
      --muted: #777;
      --border: #1e1e1e;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 2rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      color: #fff;
      text-decoration: none;
    }

    .logo-icon svg {
      height: 2em;
      width: auto;
      display: block;
    }

    .logo-text {
      letter-spacing: 0;
      font-size: 1.25rem;
      font-weight: 500;
      line-height: 1;
    }

    .logo-stretch {
      display: block;
      letter-spacing: 0.12em;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--fg); }

    .nav-links .nav-cta {
      display: inline-block;
      margin-left: 1.5rem;
      padding: 0.5rem 1rem;
      background: var(--fg);
      color: var(--bg);
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.8rem;
      transition: opacity 0.2s;
    }

    .nav-links .nav-cta:hover,
    .nav-links .nav-cta:active {
      opacity: 0.85;
      color: var(--bg);
      background: var(--fg);
    }

    footer {
      padding: 3rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .container { padding: 0 1.5rem; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

<div class="container">
  <nav>
    <a href="/" class="logo">
      <span class="logo-text">dutton digital</span>
    </a>
    <div class="nav-links">
      <a href="/#case-studies">Case studies</a>
      <a href="/#capabilities">Capabilities</a>
      <a href="/#approach">Approach</a>
      {# <a href="/posts/">Posts</a> #}
      <a href="mailto:louis@dutton.digital" class="nav-cta">Contact</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer>
    <span>&copy; 2026 Dutton Digital</span>
    <span>louis@dutton.digital</span>
  </footer>
</div>

</body>
</html>
