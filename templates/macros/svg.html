    <radialGradient id="gridFade{{ suffix }}" cx="50%" cy="50%" r="60%" fx="50%" fy="50%">

      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>

    <mask id="gridMask{{ suffix }}">

    <filter id="glow{{ suffix }}">

      <feMerge>

        <feMergeNode in="SourceGraphic"/>

    </filter>
