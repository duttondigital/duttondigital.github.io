<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Magnifying glass - search -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="170" cy="160" r="55"/>
    <line x1="210" y1="200" x2="260" y2="250"/>
  </g>

  <!-- AI brain/neural pattern inside magnifying glass -->
  <g filter="url(#softGlow)" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Neural nodes -->
    <circle cx="150" cy="140" r="8"/>
    <circle cx="190" cy="145" r="8"/>
    <circle cx="160" cy="180" r="8"/>
    <circle cx="180" cy="165" r="5"/>

    <!-- Connections -->
    <line x1="155" y1="145" x2="175" y2="163"/>
    <line x1="185" y1="150" x2="182" y2="162"/>
    <line x1="165" y1="175" x2="177" y2="168"/>
    <line x1="158" y1="142" x2="158" y2="172"/>
  </g>

  <!-- Search results being filtered down to one -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Multiple results -->
    <line x1="280" y1="120" x2="350" y2="120" opacity="0.3"/>
    <line x1="280" y1="145" x2="340" y2="145" opacity="0.3"/>
    <line x1="280" y1="170" x2="355" y2="170" opacity="0.3"/>

    <!-- Arrow pointing down to single result -->
    <line x1="315" y1="190" x2="315" y2="220"/>
    <polyline points="305,210 315,222 325,210"/>

    <!-- Single AI answer -->
    <rect x="275" y="240" width="85" height="45" rx="6"/>
  </g>

  <!-- Question mark - uncertainty -->
  <g filter="url(#softGlow)" fill="#ffffff" opacity="0.4">
    <text x="310" y="272" font-family="system-ui, sans-serif" font-size="28" text-anchor="middle">?</text>
  </g>

  <!-- Subtle circuit pattern -->
  <g stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.15">
    <path d="M50 300 L50 350 L100 350"/>
    <path d="M350 50 L350 100 L300 100"/>
    <circle cx="50" cy="300" r="3" fill="#ffffff"/>
    <circle cx="100" cy="350" r="3" fill="#ffffff"/>
    <circle cx="350" cy="50" r="3" fill="#ffffff"/>
    <circle cx="300" cy="100" r="3" fill="#ffffff"/>
  </g>
</svg>
