<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Magnifying glass with AI sparkle -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(400, 190)">
    <!-- Glass circle -->
    <circle cx="0" cy="-20" r="60"/>

    <!-- Handle -->
    <line x1="42" y1="22" x2="75" y2="55"/>
  </g>

  <!-- AI sparkle/star inside the glass -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" transform="translate(400, 170)">
    <line x1="0" y1="-20" x2="0" y2="20"/>
    <line x1="-20" y1="0" x2="20" y2="0"/>
    <line x1="-14" y1="-14" x2="14" y2="14"/>
    <line x1="14" y1="-14" x2="-14" y2="14"/>
  </g>

  <!-- Subtle horizontal lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.1">
    <line x1="80" y1="200" x2="260" y2="200"/>
    <line x1="540" y1="200" x2="720" y2="200"/>
  </g>
</svg>
