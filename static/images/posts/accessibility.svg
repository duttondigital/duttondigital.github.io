<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Universal accessibility figure - stylized person with open arms -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="200" cy="120" r="28"/>

    <!-- Body -->
    <line x1="200" y1="148" x2="200" y2="230"/>

    <!-- Arms reaching out - welcoming gesture -->
    <line x1="200" y1="175" x2="130" y2="155"/>
    <line x1="200" y1="175" x2="270" y2="155"/>

    <!-- Legs -->
    <line x1="200" y1="230" x2="155" y2="300"/>
    <line x1="200" y1="230" x2="245" y2="300"/>
  </g>

  <!-- Radiating circles representing universal access -->
  <g filter="url(#softGlow)" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.4">
    <circle cx="200" cy="190" r="90"/>
    <circle cx="200" cy="190" r="120"/>
    <circle cx="200" cy="190" r="150"/>
  </g>

  <!-- Small geometric accents -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="80" cy="80" r="3"/>
    <circle cx="320" cy="80" r="3"/>
    <circle cx="80" cy="320" r="3"/>
    <circle cx="320" cy="320" r="3"/>
  </g>
</svg>
