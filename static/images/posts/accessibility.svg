<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Universal accessibility symbol - simplified, modern -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(400, 200)">
    <!-- Circle -->
    <circle cx="0" cy="0" r="80"/>

    <!-- Figure -->
    <circle cx="0" cy="-45" r="14"/>
    <line x1="0" y1="-31" x2="0" y2="10"/>
    <line x1="-35" y1="-15" x2="35" y2="-15"/>
    <line x1="0" y1="10" x2="-25" y2="55"/>
    <line x1="0" y1="10" x2="25" y2="55"/>
  </g>

  <!-- Radiating arcs - connectivity/reach -->
  <g stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.25">
    <path d="M280 200 Q280 120 340 80" />
    <path d="M260 200 Q260 100 340 50" />
    <path d="M520 200 Q520 120 460 80" />
    <path d="M540 200 Q540 100 460 50" />
  </g>

  <!-- Subtle horizontal lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.1">
    <line x1="80" y1="200" x2="240" y2="200"/>
    <line x1="560" y1="200" x2="720" y2="200"/>
  </g>
</svg>
