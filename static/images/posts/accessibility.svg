<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Browser windows stacked - each slightly different, showing inconsistency -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Back window -->
    <rect x="130" y="100" width="160" height="110" rx="6" opacity="0.3"/>

    <!-- Middle window -->
    <rect x="115" y="130" width="160" height="110" rx="6" opacity="0.5"/>

    <!-- Front window -->
    <rect x="100" y="160" width="160" height="110" rx="6"/>
    <line x1="100" y1="185" x2="260" y2="185"/>
    <circle cx="118" cy="173" r="4"/>
    <circle cx="133" cy="173" r="4"/>
    <circle cx="148" cy="173" r="4"/>
  </g>

  <!-- Content lines - misaligned across windows to show inconsistency -->
  <g stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
    <!-- Front window content -->
    <line x1="115" y1="205" x2="180" y2="205"/>
    <line x1="115" y1="220" x2="200" y2="220"/>
    <line x1="115" y1="235" x2="160" y2="235"/>
  </g>

  <!-- Eye icon - viewing/accessibility -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="290" cy="300" rx="35" ry="22"/>
    <circle cx="290" cy="300" r="10"/>
  </g>
</svg>
