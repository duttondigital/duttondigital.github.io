<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Network/web of connected nodes -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(400, 200)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="20"/>

    <!-- Surrounding nodes -->
    <circle cx="-80" cy="-50" r="12"/>
    <circle cx="80" cy="-50" r="12"/>
    <circle cx="-80" cy="50" r="12"/>
    <circle cx="80" cy="50" r="12"/>
    <circle cx="0" cy="-90" r="12"/>
    <circle cx="0" cy="90" r="12"/>

    <!-- Connection lines -->
    <line x1="-15" y1="-12" x2="-68" y2="-42"/>
    <line x1="15" y1="-12" x2="68" y2="-42"/>
    <line x1="-15" y1="12" x2="-68" y2="42"/>
    <line x1="15" y1="12" x2="68" y2="42"/>
    <line x1="0" y1="-20" x2="0" y2="-78"/>
    <line x1="0" y1="20" x2="0" y2="78"/>
  </g>

  <!-- Outer connection hints -->
  <g stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.2">
    <line x1="240" y1="150" x2="200" y2="130"/>
    <line x1="240" y1="250" x2="200" y2="270"/>
    <line x1="560" y1="150" x2="600" y2="130"/>
    <line x1="560" y1="250" x2="600" y2="270"/>
  </g>

  <!-- Subtle horizontal lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.1">
    <line x1="80" y1="200" x2="220" y2="200"/>
    <line x1="580" y1="200" x2="720" y2="200"/>
  </g>
</svg>
