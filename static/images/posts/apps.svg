<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Phone outline -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="130" y="60" width="140" height="280" rx="20"/>

    <!-- Screen area -->
    <rect x="145" y="90" width="110" height="200" rx="4"/>

    <!-- Home indicator -->
    <line x1="175" y1="315" x2="225" y2="315"/>
  </g>

  <!-- App grid - many apps competing for attention -->
  <g filter="url(#softGlow)" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.5">
    <!-- Row 1 -->
    <rect x="155" y="105" width="28" height="28" rx="6"/>
    <rect x="193" y="105" width="28" height="28" rx="6"/>
    <rect x="231" y="105" width="14" height="28" rx="4" opacity="0.3"/>

    <!-- Row 2 -->
    <rect x="155" y="145" width="28" height="28" rx="6"/>
    <rect x="193" y="145" width="28" height="28" rx="6"/>
    <rect x="231" y="145" width="14" height="28" rx="4" opacity="0.3"/>

    <!-- Row 3 -->
    <rect x="155" y="185" width="28" height="28" rx="6"/>
    <rect x="193" y="185" width="28" height="28" rx="6"/>
    <rect x="231" y="185" width="14" height="28" rx="4" opacity="0.3"/>

    <!-- Row 4 - dock area -->
    <rect x="155" y="245" width="28" height="28" rx="6"/>
    <rect x="193" y="245" width="28" height="28" rx="6"/>
  </g>

  <!-- X mark over one app - unused/forgotten -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7">
    <line x1="159" y1="249" x2="179" y2="269"/>
    <line x1="179" y1="249" x2="159" y2="269"/>
  </g>

  <!-- Simple website alternative - browser window -->
  <g filter="url(#softGlow)" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.4">
    <rect x="290" y="170" width="70" height="55" rx="4"/>
    <line x1="290" y1="185" x2="360" y2="185"/>
    <circle cx="300" cy="178" r="3"/>
  </g>

  <!-- Arrow pointing to simpler option -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="270" y1="200" x2="285" y2="200"/>
    <polyline points="280,195 287,200 280,205"/>
  </g>
</svg>
