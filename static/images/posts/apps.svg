<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Smartphone outline -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(400, 200)">
    <rect x="-50" y="-100" width="100" height="200" rx="12"/>

    <!-- Screen -->
    <rect x="-40" y="-80" width="80" height="140" rx="4"/>

    <!-- Home indicator -->
    <line x1="-20" y1="80" x2="20" y2="80"/>
  </g>

  <!-- App grid icons inside screen -->
  <g stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.4" transform="translate(400, 200)">
    <rect x="-32" y="-70" width="22" height="22" rx="5"/>
    <rect x="10" y="-70" width="22" height="22" rx="5"/>
    <rect x="-32" y="-38" width="22" height="22" rx="5"/>
    <rect x="10" y="-38" width="22" height="22" rx="5"/>
    <rect x="-32" y="-6" width="22" height="22" rx="5"/>
    <rect x="10" y="-6" width="22" height="22" rx="5"/>
  </g>

  <!-- X through the phone - not needed -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6" transform="translate(400, 200)">
    <line x1="-70" y1="-120" x2="70" y2="120"/>
  </g>

  <!-- Subtle horizontal lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.1">
    <line x1="80" y1="200" x2="280" y2="200"/>
    <line x1="520" y1="200" x2="720" y2="200"/>
  </g>
</svg>
