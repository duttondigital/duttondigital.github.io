<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="moduleFade" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="fadeMask">
      <rect width="800" height="400" fill="url(#moduleFade)"/>
    </mask>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Modular background grid -->
  <g mask="url(#fadeMask)">
    <rect x="200" y="20" width="48" height="48" rx="8" fill="white" opacity="0.04"/>
    <rect x="256" y="20" width="48" height="48" rx="8" fill="white" opacity="0.06"/>
    <rect x="312" y="20" width="48" height="48" rx="8" fill="white" opacity="0.03"/>
    <rect x="440" y="20" width="48" height="48" rx="8" fill="white" opacity="0.05"/>
    <rect x="496" y="20" width="48" height="48" rx="8" fill="white" opacity="0.04"/>

    <rect x="144" y="76" width="48" height="48" rx="8" fill="white" opacity="0.03"/>
    <rect x="200" y="76" width="48" height="48" rx="8" fill="white" opacity="0.07"/>
    <rect x="256" y="76" width="48" height="48" rx="8" fill="white" opacity="0.05"/>
    <rect x="312" y="76" width="48" height="48" rx="8" fill="white" opacity="0.08"/>
    <rect x="368" y="76" width="48" height="48" rx="8" fill="white" opacity="0.06"/>
    <rect x="424" y="76" width="48" height="48" rx="8" fill="white" opacity="0.07"/>
    <rect x="480" y="76" width="48" height="48" rx="8" fill="white" opacity="0.04"/>
    <rect x="536" y="76" width="48" height="48" rx="8" fill="white" opacity="0.03"/>

    <rect x="144" y="132" width="48" height="48" rx="8" fill="white" opacity="0.05"/>
    <rect x="200" y="132" width="48" height="48" rx="8" fill="white" opacity="0.04"/>
    <rect x="480" y="132" width="48" height="48" rx="8" fill="white" opacity="0.05"/>
    <rect x="536" y="132" width="48" height="48" rx="8" fill="white" opacity="0.06"/>

    <rect x="144" y="220" width="48" height="48" rx="8" fill="white" opacity="0.04"/>
    <rect x="200" y="220" width="48" height="48" rx="8" fill="white" opacity="0.06"/>
    <rect x="480" y="220" width="48" height="48" rx="8" fill="white" opacity="0.04"/>
    <rect x="536" y="220" width="48" height="48" rx="8" fill="white" opacity="0.05"/>

    <rect x="144" y="276" width="48" height="48" rx="8" fill="white" opacity="0.03"/>
    <rect x="200" y="276" width="48" height="48" rx="8" fill="white" opacity="0.05"/>
    <rect x="256" y="276" width="48" height="48" rx="8" fill="white" opacity="0.07"/>
    <rect x="312" y="276" width="48" height="48" rx="8" fill="white" opacity="0.05"/>
    <rect x="368" y="276" width="48" height="48" rx="8" fill="white" opacity="0.06"/>
    <rect x="424" y="276" width="48" height="48" rx="8" fill="white" opacity="0.04"/>
    <rect x="480" y="276" width="48" height="48" rx="8" fill="white" opacity="0.06"/>
    <rect x="536" y="276" width="48" height="48" rx="8" fill="white" opacity="0.03"/>

    <rect x="200" y="332" width="48" height="48" rx="8" fill="white" opacity="0.04"/>
    <rect x="256" y="332" width="48" height="48" rx="8" fill="white" opacity="0.05"/>
    <rect x="440" y="332" width="48" height="48" rx="8" fill="white" opacity="0.04"/>
    <rect x="496" y="332" width="48" height="48" rx="8" fill="white" opacity="0.06"/>
  </g>

  <!-- Smartphone -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(400, 200)">
    <rect x="-45" y="-90" width="90" height="180" rx="10"/>
    <rect x="-35" y="-70" width="70" height="125" rx="3"/>
    <line x1="-18" y1="72" x2="18" y2="72"/>
  </g>

  <!-- App grid inside -->
  <g stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.4" transform="translate(400, 200)">
    <rect x="-28" y="-62" width="20" height="20" rx="4"/>
    <rect x="8" y="-62" width="20" height="20" rx="4"/>
    <rect x="-28" y="-34" width="20" height="20" rx="4"/>
    <rect x="8" y="-34" width="20" height="20" rx="4"/>
    <rect x="-28" y="-6" width="20" height="20" rx="4"/>
    <rect x="8" y="-6" width="20" height="20" rx="4"/>
  </g>

  <!-- Diagonal strike through -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6" transform="translate(400, 200)">
    <line x1="-60" y1="-105" x2="60" y2="105"/>
  </g>
</svg>
