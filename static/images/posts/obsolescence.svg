<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Software window / interface -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main window -->
    <rect x="90" y="100" width="220" height="180" rx="8"/>

    <!-- Title bar -->
    <line x1="90" y1="130" x2="310" y2="130"/>

    <!-- Window controls -->
    <circle cx="115" cy="115" r="6"/>
    <circle cx="140" cy="115" r="6"/>
    <circle cx="165" cy="115" r="6"/>
  </g>

  <!-- Content lines being replaced/updated -->
  <g filter="url(#softGlow)" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.4">
    <line x1="115" y1="155" x2="220" y2="155"/>
    <line x1="115" y1="175" x2="250" y2="175"/>
    <line x1="115" y1="195" x2="200" y2="195"/>
    <line x1="115" y1="215" x2="235" y2="215"/>
  </g>

  <!-- Update/refresh arrows - forced upgrade concept -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Circular arrow -->
    <path d="M200 310 A50 50 0 1 1 250 335"/>
    <polyline points="250,320 250,340 270,340"/>
  </g>

  <!-- Price tag / subscription symbol -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round">
    <circle cx="320" cy="130" r="25"/>
    <text x="320" y="137" fill="#ffffff" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle">£</text>
  </g>

  <!-- Ascending price lines -->
  <g filter="url(#softGlow)" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.3">
    <line x1="350" y1="180" x2="350" y2="160"/>
    <line x1="360" y1="180" x2="360" y2="145"/>
    <line x1="370" y1="180" x2="370" y2="125"/>
  </g>
</svg>
