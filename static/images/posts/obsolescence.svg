<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Circular arrows - forced update/refresh cycle -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(400, 200)">
    <!-- Circular path -->
    <path d="M0 -70 A70 70 0 1 1 -60 35"/>
    <path d="M0 70 A70 70 0 1 1 60 -35"/>

    <!-- Arrow heads -->
    <polyline points="-70,-15 -60,35 -15,25" fill="none"/>
    <polyline points="70,15 60,-35 15,-25" fill="none"/>
  </g>

  <!-- Clock/time in center -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" transform="translate(400, 200)">
    <circle cx="0" cy="0" r="25"/>
    <line x1="0" y1="0" x2="0" y2="-15"/>
    <line x1="0" y1="0" x2="10" y2="8"/>
  </g>

  <!-- Subtle horizontal lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.1">
    <line x1="80" y1="200" x2="250" y2="200"/>
    <line x1="550" y1="200" x2="720" y2="200"/>
  </g>
</svg>
